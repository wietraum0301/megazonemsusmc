<script>
  // 네비게이션 호버 유지 기능
  document.addEventListener('DOMContentLoaded', function() {
    const groups = document.querySelectorAll('.group');
    const nav = document.querySelector('nav');
    const navContent = nav.querySelector('.mx-auto'); // 네비게이션 콘텐츠 영역
    
    let activeGroup = null; // currently hovered group or last hovered while in nav gap

    groups.forEach(group => {
      const dropdown = group.querySelector('[class*="invisible"]');

      group.addEventListener('mouseenter', () => {
        // mark current group as active and show only its dropdown
        groups.forEach(g => {
          g.classList.remove('hover-active');
          g.querySelector('[class*="invisible"]')?.classList.remove('show-dropdown');
        });
        activeGroup = group;
        group.classList.add('hover-active');
        dropdown?.classList.add('show-dropdown');
        nav.classList.add('nav-hover-active');
      });

      group.addEventListener('mouseleave', () => {
        // remove group's hover class but keep it as activeGroup so nav gap can still show its dropdown
        group.classList.remove('hover-active');
        setTimeout(() => {
          // keep the last active dropdown while the pointer is still inside the nav content area,
          // including the empty space between menu items
          if (!navContent.matches(':hover') && !nav.querySelector('.invisible:hover')) {
            // pointer not over any group or dropdown: hide
            dropdown?.classList.remove('show-dropdown');
            nav.classList.remove('nav-hover-active');
            activeGroup = null;
          }
        }, 80);
      });
    });

    // 네비게이션 영역 전체 호버 감지 (gap 포함)
    navContent.addEventListener('mouseenter', () => {
      // when entering the nav content area (gap), if we have an activeGroup keep its dropdown visible
      if (activeGroup) {
        activeGroup.querySelector('[class*="invisible"]')?.classList.add('show-dropdown');
        nav.classList.add('nav-hover-active');
      } else {
        nav.classList.add('nav-hover-content');
      }
    });

    navContent.addEventListener('mouseleave', () => {
      nav.classList.remove('nav-hover-content');
      // hide any visible dropdowns when leaving the nav content
      groups.forEach(g => g.querySelector('[class*="invisible"]')?.classList.remove('show-dropdown'));
      groups.forEach(g => g.classList.remove('hover-active'));
      nav.classList.remove('nav-hover-active');
      activeGroup = null;
    });

    // 로고/CTA 호버 시 헤더을 검정으로 복구하고 모든 드롭다운 숨김
    const logo = nav.querySelector('a.font-headline');
    const ctaButton = nav.querySelector('a[href*="teams.microsoft.com"]');

    [logo, ctaButton].forEach(el => {
      if (el) {
        el.addEventListener('mouseenter', () => {
          groups.forEach(g => {
            g.classList.remove('hover-active');
            g.querySelector('[class*="invisible"]')?.classList.remove('show-dropdown');
          });
          nav.classList.remove('nav-hover-active');
          nav.classList.remove('nav-hover-content');
        });
      }
    });

    // 드롭다운 영역에서 빠져나가면 모두 숨김
    nav.addEventListener('mouseleave', () => {
      groups.forEach(g => {
        g.classList.remove('hover-active');
        g.querySelector('[class*="invisible"]')?.classList.remove('show-dropdown');
      });
      nav.classList.remove('nav-hover-active');
      nav.classList.remove('nav-hover-content');
    });
  });
</script>
